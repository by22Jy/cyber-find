name: CI (required)

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel build
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 cyberfind --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 cyberfind --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
        
    - name: Check imports with isort
      run: |
        pip install isort
        isort --check-only cyberfind --diff
        
    - name: Type checking with mypy
      run: |
        pip install mypy types-PyYAML types-requests
        mypy cyberfind --ignore-missing-imports
      
    - name: Lint (critical)
      run: flake8 cyberfind --select=E9,F63,F7,F82
        
    - name: Run tests
      run: |
        pytest tests/ -v
        
    - name: Build package
      run: |
        python -m build