name: Greetings

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          issue-message: |
            👋 **Welcome, and thanks for your first issue!**

            We really appreciate you taking the time to report this 💙  
            To help us respond faster, please double-check that your issue includes:

            - 🔁 Clear steps to reproduce (for bugs)
            - 🎯 Expected vs actual behavior
            - 🧾 Logs, error messages, or screenshots (if applicable)

            A maintainer will take a look soon.  
            Thanks for helping make this project better! 🚀

          pr-message: |
            🎉 **Thanks for your first pull request!**

            That’s awesome — contributions like this keep the project moving forward 💪  
            Before review, please make sure that:

            - ✅ All CI checks are passing
            - 🧪 Tests are added or updated when needed
            - 📝 The PR description clearly explains *what* and *why*

            If everything looks good, we’ll review it shortly.  
            Welcome aboard, and happy hacking! 💙✨
