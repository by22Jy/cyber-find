[pytest]
# pytest configuration for CyberFind

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for organizing tests
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    performance: Performance tests
    asyncio: Tests that use asyncio

# Coverage options
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:warnings

# asyncio mode
asyncio_mode = auto

# Minimum Python version
minversion = 7.0
