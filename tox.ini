[tox]
envlist = py{310,311}, lint, type, coverage

[testenv]
deps = -r{toxinidir}/requirements-dev.txt
commands = pytest {posargs:tests/}

[testenv:lint]
deps = -r{toxinidir}/requirements-dev.txt
commands = 
    black --check cyberfind tests
    isort --check-only cyberfind tests
    flake8 cyberfind tests

[testenv:type]
deps = -r{toxinidir}/requirements-dev.txt
commands = mypy cyberfind --ignore-missing-imports

[testenv:coverage]
deps = -r{toxinidir}/requirements-dev.txt
commands =
    pytest tests/ --cov=cyberfind --cov-report=term-missing --cov-report=html --cov-report=xml
    coverage report --fail-under=80

[testenv:docs]
deps = 
    -r{toxinidir}/requirements-dev.txt
    sphinx
    sphinx-rtd-theme
commands = sphinx-build -W -b html -d {envtmpdir}/doctrees docs docs/_build/html

[testenv:security]
deps = -r{toxinidir}/requirements-dev.txt
commands =
    bandit -r cyberfind -ll
    safety check

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers

[coverage:run]
source = cyberfind
branch = True
omit =
    */tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
precision = 2
